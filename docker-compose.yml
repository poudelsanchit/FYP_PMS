version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"       # HTTP / WebSocket
      - "7881:7881"       # TCP RTC
      - "50000-50100:50000-50100/udp"  # UDP RTP media
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    depends_on:
      - redis
    environment:
      LIVEKIT_KEYS: "APIrLwnP2gmvDow: aYehWgmEaFsgNeXtZgIuY2YrJ2erApxeMFd89hbO1clD"

volumes:
  redis_data: